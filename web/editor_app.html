        }

        function toggleMusic(show) {
            if (show === undefined) show = !document.getElementById('musicPanel').classList.contains('show');
            document.getElementById('musicPanel').classList.toggle('show', show);
            if (show) updateMusicPanelUI();
        }

        function updateMusicPanelUI() {
            const hasFile = !!(musicState.file && musicState.url);
            const meta = musicState.meta || {};

            // Update current file display
            const currentFileEl = document.getElementById('musicCurrentFile');
            const previewPlayerEl = document.getElementById('musicPreviewPlayer');
            const uploadZoneEl = document.getElementById('musicUploadZone');

            if (hasFile) {
                currentFileEl.style.display = 'flex';
                previewPlayerEl.style.display = 'block';
                uploadZoneEl.style.display = 'none';

                document.getElementById('musicCurrentTitle').textContent =
                    meta.title || musicState.file.name.replace(/\.[^.]+$/, '');
                document.getElementById('musicCurrentMeta').textContent =
                    [meta.artist, meta.album].filter(Boolean).join(' · ') || '未知作者';
                document.getElementById('musicCurrentDuration').textContent =
                    meta.durationSec ? formatDuration(meta.durationSec) : '';

                const coverEl = document.getElementById('musicCurrentCover');
                if (meta.coverDataUrl) {
                    coverEl.src = meta.coverDataUrl;
                    coverEl.style.display = 'block';
                } else {
                    coverEl.style.display = 'none';
                }

                // Update banner inputs
                document.getElementById('bannerTitleInput').value = meta.title || '';
                document.getElementById('bannerArtistInput').value = meta.artist || '';
                document.getElementById('bannerAlbumInput').value = meta.album || '';
            } else {
                currentFileEl.style.display = 'none';
                previewPlayerEl.style.display = 'none';
                uploadZoneEl.style.display = 'block';
            }

            // Update cover preview
            const coverPreviewEl = document.getElementById('musicCoverPreview');
            if (musicState.coverImage && musicState.coverImage.complete) {
                coverPreviewEl.src = musicState.coverImage.src;
                coverPreviewEl.style.display = 'block';
            } else if (meta.coverDataUrl) {
                coverPreviewEl.src = meta.coverDataUrl;
                coverPreviewEl.style.display = 'block';
            } else {
                coverPreviewEl.style.display = 'none';
            }
        }

        function formatDuration(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // Batch Export
        function parseBatchText(text) {
            const poems = [];
            const blocks = text.trim().split(/\n{2,}/);
            for (const block of blocks) {
                const lines = block.trim().split('\n').filter(l => l.trim());
                if (lines.length < 2) continue;
                const firstLine = lines[0];
                const sepIndex = firstLine.indexOf('|');
                if (sepIndex === -1) continue;
                const title = firstLine.substring(0, sepIndex).trim();
                const rest = firstLine.substring(sepIndex + 1).trim();
                const authorSep = rest.indexOf('|');
                let author, contentLines;
                if (authorSep === -1) {
                    author = rest;
                    contentLines = lines.slice(1);
                } else {
                    author = rest.substring(0, authorSep).trim();
                    contentLines = [rest.substring(authorSep + 1).trim(), ...lines.slice(1)];
                }
                if (!title || !author || contentLines.length === 0) continue;
                poems.push({ title, author, lines: contentLines });
            }
            return poems;
        }

        function renderBatchPreview() {
            const text = document.getElementById('batchTextarea').value;
            const poems = parseBatchText(text);
            const preview = document.getElementById('batchPreview');
            if (poems.length === 0) {
                preview.innerHTML = '<div style="font-size:12px;color:var(--ink-light);text-align:center;padding:10px;">输入格式正确后将在这里预览</div>';
                return;
            }
            preview.innerHTML = poems.map((p, i) => `
                <div class="batch-preview-item">
                    <span class="idx">${i + 1}.</span>
                    <span class="title">${p.title}</span>
                    <span class="author">${p.author}</span>
                </div>
            `).join('');
        }

        async function doBatchExport() {
            const poems = parseBatchText(document.getElementById('batchTextarea').value);
            if (poems.length === 0) {
                showToast('请输入有效的诗词数据');
                return;
            }

            const btn = document.getElementById('batchExport');
            const progress = document.getElementById('batchProgress');
            btn.disabled = true;
            btn.textContent = '导出中...';

            for (let i = 0; i < poems.length; i++) {
                progress.textContent = `正在导出 ${i + 1} / ${poems.length}`;
                const p = poems[i];
                const layout = {
                    fontSize: 20,
                    lineHeight: 44
                };
                const canvas = document.createElement('canvas');
                const sealChar = p.author.match(/^([^〔]+)/) ? p.author.match(/^([^〔]+)/)[1] : p.title.charAt(0);
                drawCard(canvas, { ...p, sealChar, fontSize: layout.fontSize, lineHeight: layout.lineHeight });
                downloadCanvas(canvas, generateCardFilename(p.title));
                if (i < poems.length - 1) {
                    await new Promise(r => setTimeout(r, 500));
                }
            }

            progress.textContent = '';
            btn.disabled = false;
            btn.textContent = '开始导出';
            showToast(`已导出 ${poems.length} 张卡片`);
            toggleBatch(false);
        }

        function toggleBatch(show) {
            if (show === undefined) show = !document.getElementById('batchModal').classList.contains('show');
            document.getElementById('batchModal').classList.toggle('show', show);
            if (!show) {
                document.getElementById('batchTextarea').value = '';
                document.getElementById('batchPreview').innerHTML = '';
                document.getElementById('batchProgress').textContent = '';
            }
        }

        // Event Listeners
        const openEditorBtn = document.getElementById('openEditor');
        if (openEditorBtn) {
            openEditorBtn.addEventListener('click', () => openEditor());
        }
        const editorOverlay = document.getElementById('editorOverlay');
        if (editorOverlay) {
            editorOverlay.addEventListener('click', closeEditor);
        }
        document.getElementById('editorCancel').addEventListener('click', closeEditor);
        document.getElementById('editorSave').addEventListener('click', saveCard);
        document.getElementById('copyBtn').addEventListener('click', copyCard);
        document.getElementById('exportWebmBtn').addEventListener('click', exportVideo);

        document.getElementById('editorTextarea').addEventListener('input', renderEditor);
        document.getElementById('editorTitleInput').addEventListener('input', renderEditor);
        document.getElementById('editorAuthorInput').addEventListener('input', renderEditor);
        document.getElementById('editorSealInput').addEventListener('input', renderEditor);

        ['ctrlFontSize', 'ctrlLineHeight'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                const valId = 'val' + id.charAt(4).toUpperCase() + id.slice(5);
                document.getElementById(valId).textContent = document.getElementById(id).value;
                renderEditor();
            });
        });

        document.getElementById('historyBtn').addEventListener('click', () => toggleHistory(true));
        document.getElementById('closeHistory').addEventListener('click', () => toggleHistory(false));
        document.getElementById('historyOverlay').addEventListener('click', () => toggleHistory(false));
        document.getElementById('clearHistory').addEventListener('click', () => {
            if (confirm('确定清空所有历史记录？')) {
                clearHistory();
                renderHistory();
            }
        });

        // Music Panel
        document.getElementById('musicBtn').addEventListener('click', () => toggleMusic(true));
        document.getElementById('closeMusic').addEventListener('click', () => toggleMusic(false));

        // Music upload zone drag & drop
        const musicUploadZone = document.getElementById('musicUploadZone');
        musicUploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            musicUploadZone.classList.add('dragover');
        });
        musicUploadZone.addEventListener('dragleave', () => {
            musicUploadZone.classList.remove('dragover');
        });
        musicUploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            musicUploadZone.classList.remove('dragover');
            const [file] = e.dataTransfer.files || [];
            if (file && file.type.startsWith('audio/')) {
                setMusicFile(file);
            }
        });
        musicUploadZone.addEventListener('click', () => {
            document.getElementById('musicUploadInput').click();
        });

        document.getElementById('musicRemoveBtn').addEventListener('click', () => clearMusicFile());

        document.getElementById('bannerCoverInput').addEventListener('change', async (event) => {
            const [file] = event.target.files || [];
            if (file) {
                await setBannerCoverFromFile(file);
                updateMusicPanelUI();
            }
            event.target.value = '';
        });
        document.getElementById('bannerCoverClearBtn').addEventListener('click', () => {
            musicState.coverImage = null;
            musicState.meta = musicState.meta || {};
            musicState.meta.coverDataUrl = '';
            updateMusicPanelUI();
        });

        const batchBtn = document.getElementById('batchBtn');
        if (batchBtn) {
            batchBtn.addEventListener('click', () => toggleBatch(true));
        }
        document.getElementById('batchClose').addEventListener('click', () => toggleBatch(false));
        document.getElementById('batchOverlay').addEventListener('click', () => toggleBatch(false));
        document.getElementById('batchCancel').addEventListener('click', () => toggleBatch(false));
        document.getElementById('batchExport').addEventListener('click', doBatchExport);
        document.getElementById('batchTextarea').addEventListener('input', renderBatchPreview);

        ['title', 'author', 'content', 'seal'].forEach(zone => {
            const cap = zone.charAt(0).toUpperCase() + zone.slice(1);
            document.getElementById(`fontUpload${cap}`).addEventListener('change', (event) => {
                const [file] = event.target.files || [];
                applyZoneFont(zone, file);
                event.target.value = '';
            });
            document.getElementById(`fontClear${cap}`).addEventListener('click', () => clearZoneFont(zone));
            updateFontStateText(zone);
        });

        document.getElementById('musicUploadInput').addEventListener('change', (event) => {
            const [file] = event.target.files || [];
            if (file) {
                setMusicFile(file);
                event.target.value = '';
            }
        });

        // Media file input handlers
        document.getElementById('mediaAddImage').addEventListener('change', async (event) => {
            const files = Array.from(event.target.files || []);
            for (const file of files) {
                if (file.type.startsWith('image/')) {
                    await addMediaFile(file);
                }
            }
            event.target.value = '';
        });

        document.getElementById('musicPreview').addEventListener('loadeddata', () => {
            if (musicState.url) {
                const d = Number(document.getElementById('musicPreview').duration);
                if (Number.isFinite(d) && d > 0) {
                    if (!musicState.meta) {
                        musicState.meta = { title: '', artist: '', album: '', durationSec: d, coverDataUrl: '' };
                        syncBannerInputsFromMeta();
                    } else if (!musicState.meta.durationSec) {
                        musicState.meta.durationSec = d;
                    }
                    normalizeClipInputsByDuration(d);
                    updateMusicPanelUI();
                    renderEditor();
                }
                showToast('音乐已加载，可先预览再导出');
            }
        });
        document.getElementById('musicPreview').addEventListener('play', () => {
            // Reset start to 0:00 when playback starts fresh
            document.getElementById('clipStartInput').value = '0:00';
        });
        document.getElementById('musicPreview').addEventListener('error', () => {
            if (!musicState.url) return;
            clearMusicFile(false);
            showToast('音乐文件无效或已损坏');
        });
        document.getElementById('musicPreview').addEventListener('timeupdate', () => {
            const preview = document.getElementById('musicPreview');
            const currentTime = preview.currentTime;
            if (Number.isFinite(currentTime) && currentTime > 0) {
                const startInput = document.getElementById('clipStartInput');
                const endInput = document.getElementById('clipEndInput');
                const endRaw = endInput.value.trim();
                const endSec = endRaw ? parseClockToSec(endRaw) : 0;
                const currentStartSec = parseClockToSec(startInput.value);
                // Update start to track current time if within bounds
                if ((!endRaw || currentTime < endSec) && currentTime !== currentStartSec) {
                    const m = Math.floor(currentTime / 60);
                    const s = Math.floor(currentTime % 60);
                    startInput.value = `${m}:${s.toString().padStart(2, '0')}`;
                }
            }
        });
        ['bannerTitleInput', 'bannerArtistInput', 'bannerAlbumInput'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                renderMusicMetaBanner();
                renderEditor();
            });
        });
        document.getElementById('bannerCoverInput').addEventListener('change', async (event) => {
            const [file] = event.target.files || [];
            if (!file) return;
            if (file.type && !file.type.startsWith('image/')) {
                showToast('请选择图片文件作为封面');
                event.target.value = '';
                return;
            }
            try {
                const dataUrl = await fileToDataUrl(file);
                await setBannerCoverFromDataUrl(dataUrl);
                renderEditor();
                showToast('横幅封面已更新');
            } catch {
                showToast('封面读取失败');
            } finally {
                event.target.value = '';
            }
        });
        document.getElementById('bannerCoverClearBtn').addEventListener('click', async () => {
            await setBannerCoverFromDataUrl('');
            renderEditor();
            showToast('已清除横幅封面');
        });
        ['toggleTitle', 'toggleArtist', 'toggleAlbum', 'toggleClipRange'].forEach(id => {
            document.getElementById(id).addEventListener('change', (e) => {
                const key = 'bannerShow' + id.replace('toggle', '').replace(/^(.)/, (c) => c.toUpperCase());
                musicState[key] = e.target.checked;
                renderEditor();
            });
        });
        document.getElementById('lyricsTextarea').addEventListener('input', (e) => {
            musicState.lyricsText = e.target.value;
            musicState.parsedLyrics = parseLyrics(e.target.value);
            renderEditor();
        });
        document.getElementById('toggleLyrics').addEventListener('change', (e) => {
            musicState.showLyrics = e.target.checked;
            renderEditor();
        });

        openEditor();
    </script>
</body>
</html>
