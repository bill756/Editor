<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --ink: #1a1a1a;
            --ink-light: #5a5a5a;
            --paper: #f5efe2;
            --paper-warm: #ede5d4;
            --seal-red: #b84c3e;
            --seal-dark: #8a3a2e;
            --shadow: rgba(30, 20, 10, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Noto Serif SC", serif;
            background: var(--paper);
            min-height: 100vh;
            overflow: hidden;
            cursor: default;
            user-select: none;
        }

        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(
                135deg,
                #e8dfd0 0%,
                #ddd0bc 15%,
                #e0d5c5 30%,
                #d4c4b0 45%,
                #e2d6c5 60%,
                #d8cabb 75%,
                #e0d2c2 100%
            );
            background-size: 400% 400%;
            animation: gradientFlow 18s ease infinite;
        }

        .bg-gradient::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(200,180,150,0.18) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(190,170,140,0.15) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 10%, rgba(210,190,160,0.12) 0%, transparent 40%);
            animation: gradientFlow 12s ease infinite reverse;
        }

        .bg-gradient::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 70% 20%, rgba(180,160,130,0.1) 0%, transparent 40%),
                radial-gradient(ellipse at 30% 80%, rgba(200,175,145,0.12) 0%, transparent 50%);
            animation: gradientFlow 15s ease infinite;
            animation-delay: -5s;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(180,160,130,0.2) 100%);
            pointer-events: none;
        }

        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 22px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .page-title {
            font-family: "Ma Shan Zheng", serif;
            font-size: 20px;
            color: var(--ink);
            letter-spacing: 0.15em;
        }

        .topbar-actions {
            display: flex;
            gap: 12px;
        }

        .header-btn {
            font-family: "Noto Serif SC", serif;
            font-size: 12px;
            color: var(--ink-light);
            background: transparent;
            border: 1px solid rgba(0,0,0,0.14);
            padding: 7px 18px;
            border-radius: 1px;
            cursor: pointer;
            letter-spacing: 0.18em;
            transition: all 0.25s ease;
        }
        .header-btn:hover {
            background: var(--ink);
            color: var(--paper);
            border-color: var(--ink);
        }

        .header-btn.primary {
            background: var(--seal-red);
            color: #fff;
            border-color: var(--seal-red);
        }
        .header-btn.primary:hover {
            background: var(--seal-dark);
            border-color: var(--seal-dark);
        }

        .scene { display: none; }

        .welcome-card {
            background: var(--paper-warm);
            border-radius: 4px;
            padding: 48px 52px;
            max-width: 580px;
            width: 92vw;
            box-shadow:
                0 2px 8px var(--shadow),
                0 12px 40px rgba(30,20,10,0.08);
            animation: pageIn 0.5s ease forwards;
        }

        .welcome-title {
            font-family: "Ma Shan Zheng", serif;
            font-size: 28px;
            color: var(--ink);
            text-align: center;
            letter-spacing: 0.18em;
            margin-bottom: 16px;
        }

        .welcome-divider {
            width: 36px;
            height: 1px;
            background: rgba(0,0,0,0.12);
            margin: 0 auto 20px;
        }

        .welcome-hint {
            font-size: 13px;
            color: var(--ink-light);
            text-align: center;
            letter-spacing: 0.12em;
            line-height: 1.8;
        }

        .history-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 340px;
            height: 100vh;
            background: var(--paper);
            z-index: 200;
            display: none;
            flex-direction: column;
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
        }

        .history-panel.show {
            display: flex;
        }

        .history-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-title {
            font-family: "Ma Shan Zheng", serif;
            font-size: 18px;
            color: var(--ink);
            letter-spacing: 0.1em;
        }

        .history-actions {
            display: flex;
            gap: 10px;
        }

        .history-btn {
            font-family: "Noto Serif SC", serif;
            font-size: 11px;
            color: var(--ink-light);
            background: transparent;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 5px 12px;
            border-radius: 2px;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: all 0.2s;
        }
        .history-btn:hover {
            background: var(--ink);
            color: var(--paper);
            border-color: var(--ink);
        }

        .history-btn.danger:hover {
            background: var(--seal-red);
            border-color: var(--seal-red);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }

        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

        .history-item {
            padding: 14px 24px;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            transition: background 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .history-item:hover { background: rgba(0,0,0,0.03); }
        .history-item:last-child { border-bottom: none; }

        .history-item-left {
            flex: 1;
            min-width: 0;
        }

        .history-item-title {
            font-family: "Ma Shan Zheng", serif;
            font-size: 16px;
            color: var(--ink);
            margin-bottom: 3px;
        }

        .history-item-author {
            font-size: 11px;
            color: var(--ink-light);
            letter-spacing: 0.1em;
        }

        .history-item-preview {
            font-size: 12px;
            color: var(--ink-light);
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-time {
            font-size: 10px;
            color: rgba(0,0,0,0.2);
            letter-spacing: 0.05em;
            white-space: nowrap;
            margin-left: 10px;
        }

        .history-item-delete {
            font-size: 16px;
            color: rgba(0,0,0,0.15);
            cursor: pointer;
            padding: 4px 8px;
            transition: color 0.2s;
            flex-shrink: 0;
        }
        .history-item-delete:hover { color: var(--seal-red); }

        .history-empty {
            text-align: center;
            padding: 40px;
            font-size: 13px;
            color: var(--ink-light);
            letter-spacing: 0.1em;
        }

        .history-overlay {
            position: fixed;
            inset: 0;
            z-index: 199;
            display: none;
            background: rgba(0,0,0,0.3);
        }
        .history-overlay.show { display: block; }

        /* Music Panel */
        .music-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 360px;
            height: 100vh;
            background: var(--paper);
            z-index: 200;
            display: none;
            flex-direction: column;
            box-shadow: -4px 0 24px rgba(0,0,0,0.12);
            animation: slideInRight 0.3s ease;
        }
        .music-panel.show { display: flex; }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0.5; }
            to { transform: translateX(0); opacity: 1; }
        }

        .music-panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(184,76,62,0.06) 0%, transparent 60%);
        }

        .music-panel-title {
            font-family: "Ma Shan Zheng", serif;
            font-size: 18px;
            color: var(--ink);
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .music-panel-title::before {
            content: '♪';
            font-size: 20px;
            color: var(--seal-red);
        }

        .music-panel-actions {
            display: flex;
            gap: 10px;
        }

        .music-panel-btn {
            font-family: "Noto Serif SC", serif;
            font-size: 11px;
            color: var(--ink-light);
            background: transparent;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 5px 12px;
            border-radius: 2px;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: all 0.2s;
        }
        .music-panel-btn:hover {
            background: var(--ink);
            color: var(--paper);
            border-color: var(--ink);
        }

        .music-panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }
        .music-panel-body::-webkit-scrollbar { width: 4px; }
        .music-panel-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

        .music-upload-section {
            margin-bottom: 24px;
        }

        .music-section-label {
            font-family: "Ma Shan Zheng", serif;
            font-size: 14px;
            color: var(--ink);
            letter-spacing: 0.08em;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .music-upload-zone {
            border: 2px dashed rgba(0,0,0,0.12);
            border-radius: 6px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(0,0,0,0.02);
        }
        .music-upload-zone:hover {
            border-color: var(--seal-red);
            background: rgba(184,76,62,0.04);
        }
        .music-upload-zone.dragover {
            border-color: var(--seal-red);
            background: rgba(184,76,62,0.08);
            transform: scale(1.02);
        }

        .music-upload-icon {
            font-size: 28px;
            color: var(--ink-light);
            margin-bottom: 8px;
        }
        .music-upload-zone:hover .music-upload-icon {
            color: var(--seal-red);
        }

        .music-upload-text {
            font-size: 12px;
            color: var(--ink-light);
            letter-spacing: 0.08em;
        }

        .music-upload-input {
            display: none;
        }

        .music-current-file {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: rgba(0,0,0,0.03);
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .music-current-cover {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            object-fit: cover;
            background: rgba(0,0,0,0.08);
            flex-shrink: 0;
        }

        .music-current-info {
            flex: 1;
            min-width: 0;
        }

        .music-current-title {
            font-family: "Ma Shan Zheng", serif;
            font-size: 15px;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-current-meta {
            font-size: 11px;
            color: var(--ink-light);
            letter-spacing: 0.05em;
            margin-top: 2px;
        }

        .music-current-duration {
            font-size: 12px;
            color: var(--ink-light);
            flex-shrink: 0;
        }

        .music-current-remove {
            font-size: 18px;
            color: rgba(0,0,0,0.2);
            cursor: pointer;
            padding: 4px 8px;
            transition: color 0.2s;
        }
        .music-current-remove:hover { color: var(--seal-red); }

        .music-preview-player {
            margin: 16px 0;
            border-radius: 6px;
            overflow: hidden;
            background: rgba(0,0,0,0.04);
        }

        .music-preview-player audio {
            width: 100%;
            height: 36px;
        }

        .music-banner-section {
            margin-bottom: 24px;
        }

        .music-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .music-input-row .seal-label {
            min-width: 56px;
            font-size: 12px;
            color: var(--ink-light);
            letter-spacing: 0.08em;
        }

        .music-text-input {
            flex: 1;
            font-family: "Noto Serif SC", serif;
            font-size: 12px;
            color: var(--ink);
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 3px;
            padding: 6px 10px;
            outline: none;
            transition: border-color 0.2s;
        }
        .music-text-input:focus { border-color: rgba(0,0,0,0.25); }
        .music-text-input::placeholder { color: rgba(0,0,0,0.25); }

        .music-clip-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .music-clip-row .seal-label {
            font-size: 12px;
            color: var(--ink-light);
            letter-spacing: 0.08em;
            min-width: auto;
        }

        .music-clip-input {
            width: 80px;
            font-family: "Noto Serif SC", serif;
            font-size: 12px;
            color: var(--ink);
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 3px;
            padding: 6px 8px;
            outline: none;
            text-align: center;
        }
        .music-clip-input:focus { border-color: rgba(0,0,0,0.25); }

        .music-toggle-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .music-toggle-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--ink-light);
            cursor: pointer;
            user-select: none;
            letter-spacing: 0.05em;
        }
        .music-toggle-label input[type="checkbox"] { cursor: pointer; accent-color: var(--seal-red); }

        .music-cover-section {
            margin-bottom: 24px;
        }

        .music-lyrics-section {
            margin-bottom: 24px;
        }

        .music-lyrics-hint {
            font-size: 11px;
            color: var(--ink-light);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .music-lyrics-textarea {
            width: 100%;
            height: 100px;
            font-family: "Noto Serif SC", serif;
            font-size: 12px;
            color: var(--ink);
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 3px;
            padding: 8px 10px;
            outline: none;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .music-lyrics-textarea:focus { border-color: rgba(0,0,0,0.25); }
        .music-lyrics-textarea::placeholder { color: rgba(0,0,0,0.25); }

        .music-cover-upload {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .music-cover-preview {
            width: 56px;
            height: 56px;
            border-radius: 4px;
            object-fit: cover;
            background: rgba(0,0,0,0.08);
            flex-shrink: 0;
        }

        .music-cover-btn {
            font-family: "Noto Serif SC", serif;
            font-size: 11px;
            color: var(--ink-light);
            background: transparent;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 6px 14px;
            border-radius: 2px;
            cursor: pointer;
            letter-spacing: 0.08em;
            transition: all 0.2s;
        }
        .music-cover-btn:hover {
            background: var(--ink);
            color: var(--paper);
            border-color: var(--ink);
        }

        .music-empty-state {
            text-align: center;
            padding: 32px 16px;
            color: var(--ink-light);
            font-size: 13px;
            letter-spacing: 0.08em;
            line-height: 1.8;
        }

        /* Batch Modal */
        .batch-modal {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .batch-modal.show { display: flex; }

        .batch-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
        }

        .batch-content {
            position: relative;
            background: var(--paper);
            border-radius: 8px;
            width: 92vw;
            max-width: 600px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .batch-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .batch-title {
            font-family: "Ma Shan Zheng", serif;
            font-size: 18px;
            color: var(--ink);
            letter-spacing: 0.1em;
        }

        .batch-close {
            font-size: 22px;
            color: var(--ink-light);
            cursor: pointer;
            line-height: 1;
            padding: 4px;
        }
        .batch-close:hover { color: var(--ink); }

        .batch-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .batch-textarea {
            width: 100%;
            font-family: "SimSun", "STSong", serif;
            font-size: 13px;
            color: var(--ink);
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 3px;
            padding: 12px 14px;
            resize: vertical;
            min-height: 200px;
            line-height: 1.8;
            letter-spacing: 0.08em;
            outline: none;
        }
        .batch-textarea:focus { border-color: rgba(0,0,0,0.25); }
        .batch-textarea::placeholder { color: rgba(0,0,0,0.2); }

        .batch-hint {
            font-size: 11px;
            color: var(--ink-light);
            margin-top: 8px;
            letter-spacing: 0.08em;
            line-height: 1.6;
        }

        .batch-preview {
            margin-top: 16px;
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 4px;
            padding: 16px;
            background: rgba(0,0,0,0.02);
            max-height: 200px;
            overflow-y: auto;
        }

        .batch-preview-item {
            display: flex;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            font-size: 13px;
            color: var(--ink);
        }
        .batch-preview-item:last-child { border-bottom: none; }
        .batch-preview-item .idx { color: var(--ink-light); min-width: 24px; }
        .batch-preview-item .title { font-family: "Ma Shan Zheng", serif; min-width: 100px; }
        .batch-preview-item .author { color: var(--ink-light); }

        .batch-footer {
            padding: 16px 24px;
            border-top: 1px solid rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .batch-progress {
            font-size: 12px;
            color: var(--ink-light);
            letter-spacing: 0.1em;
        }

        .batch-actions {
            display: flex;
            gap: 10px;
        }

        .batch-btn {
            font-family: "Noto Serif SC", serif;
            font-size: 12px;
            padding: 7px 20px;
            border-radius: 2px;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: all 0.2s;
            border: 1px solid rgba(0,0,0,0.15);
            background: transparent;
            color: var(--ink-light);
        }
        .batch-btn:hover {
            background: var(--ink);
            color: var(--paper);
            border-color: var(--ink);
        }
        .batch-btn.primary {
            background: var(--seal-red);
            color: #fff;
            border-color: var(--seal-red);
        }
        .batch-btn.primary:hover {
            background: var(--seal-dark);
            border-color: var(--seal-dark);
        }
        .batch-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Editor Modal */
        .editor-modal {
            position: fixed;
            inset: 76px 18px 18px;
            z-index: 120;
            display: block;
        }
        .editor-modal.show { display: block; }

        .editor-overlay { display: none; }

        .editor-content {
            background: var(--paper);
            border-radius: 8px;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: minmax(420px, 520px) minmax(480px, 1fr);
            gap: 0;
            overflow: hidden;
            box-shadow:
                0 6px 20px rgba(30,20,10,0.12),
                0 20px 60px rgba(30,20,10,0.1);
        }

        .editor-header {
            padding: 22px 24px 18px;
            border-right: 1px solid rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .editor-header-title {
            font-family: "Noto Serif SC", serif;
            font-size: 15px;
            color: var(--ink);
            letter-spacing: 0.1em;
        }

        .editor-meta-row {
            display: flex;
            gap: 12px;
        }

        .editor-meta-input {
            font-family: "Noto Serif SC", serif;

<body>
    <div class="bg-gradient"></div>

    <div class="topbar">

            <button class="header-btn" id="historyBtn">历史记录</button>
        </div>
    </div>

    <div class="scene">

            <div class="welcome-title">Editor</div>

        </div>
    </div>

            <div class="music-upload-section">

                    <div class="music-upload-text">点击或拖拽上传音频文件</div>
                    <input class="music-upload-input" id="musicUploadInput" type="file" accept="audio/*" />
                </div>
                <div class="music-current-file" id="musicCurrentFile" style="display:none;">
                    <img class="music-current-cover" id="musicCurrentCover" />
                    <div class="music-current-info">
                        <div class="music-current-title" id="musicCurrentTitle"></div>
                        <div class="music-current-meta" id="musicCurrentMeta"></div>
                    </div>
                    <div class="music-current-duration" id="musicCurrentDuration"></div>
                    <span class="music-current-remove" id="musicRemoveBtn">×</span>
                </div>
                <div class="music-preview-player" id="musicPreviewPlayer" style="display:none;">

                </div>

                    <label class="music-toggle-label"><input type="checkbox" id="toggleAlbum" checked />专辑</label>

                            <input class="font-upload-input" id="fontUploadContent" type="file" accept=".ttf,.otf,.woff,.woff2,font/ttf,font/otf,font/woff,font/woff2" />

                            <input class="font-upload-input" id="fontUploadSeal" type="file" accept=".ttf,.otf,.woff,.woff2,font/ttf,font/otf,font/woff,font/woff2" />

    <div class="toast" id="toast"></div>

    <script>
        const FONT_ZONE_LABELS = {
            title: '标题区',
            author: '作者区',
            content: '诗句区',
            seal: '印章区'
        };

        function buildFontStack(customFamily, fallbackStack) {
            return customFamily ? `"${customFamily}", ${fallbackStack}` : fallbackStack;
        }

        function getCardFontStacks() {
            return {
                title: buildFontStack(customFonts.title?.family, '"Ma Shan Zheng", "Noto Serif SC", serif'),
                author: buildFontStack(customFonts.author?.family, '"Noto Serif SC", serif'),
                contentPrimary: buildFontStack(customFonts.content?.family, '"Ma Shan Zheng", serif'),
                contentFallback: buildFontStack(customFonts.content?.family, '"SimSun", "STSong", serif'),
                seal: buildFontStack(customFonts.seal?.family, '"FZXiaoZhuan", "STXiaoZhuan", "Ma Shan Zheng", serif')
            };
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function drawTextWithEllipsis(ctx, text, x, y, maxWidth) {
            const raw = String(text || '');
            if (!raw) return;
            if (ctx.measureText(raw).width <= maxWidth) {
                ctx.fillText(raw, x, y);
                return;
            }
            let clipped = raw;
            while (clipped.length > 0 && ctx.measureText(`${clipped}…`).width > maxWidth) {
                clipped = clipped.slice(0, -1);
            }
            ctx.fillText(`${clipped}…`, x, y);
        }

        function drawCard(canvasEl, { title, author, lines, sealChar, fontSize, lineHeight, lyricsElapsed, mediaElapsed }) {
            const scale = 2;
            const fontStacks = getCardFontStacks();

            const tempCanvas = document.createElement('canvas');
            const tctx = tempCanvas.getContext('2d');

            tctx.font = `${fontSize}px ${fontStacks.contentFallback}`;
            let maxLineW = 0;
            for (const line of lines) {
                const w = tctx.measureText(line).width;
                if (w > maxLineW) maxLineW = w;
            }
            tctx.font = `30px ${fontStacks.title}`;
            const titleW = tctx.measureText(title).width;
            const contentW = Math.max(maxLineW, titleW);

            const baseMargin = 45;
            const sealArea = 90;
            const margin = Math.max(baseMargin, sealArea / 2);
            const rawCardW = contentW + margin + sealArea;
            const actualCardW = Math.max(400, Math.floor(rawCardW));

            const contentCenter = actualCardW / 2 + 10;
            const cardCenter = actualCardW / 2;

            const totalLineCount = lines.length;
            const hasMetaBanner = !!(musicState.file && musicState.meta);
            const hasMediaArea = mediaState.items.length > 0;
            const mediaAreaH = hasMediaArea ? 180 : 0;
            const bannerWrapH = hasMetaBanner ? 79 : 0;
            const cardH = 130 + totalLineCount * lineHeight + 54 + mediaAreaH + bannerWrapH;

            canvasEl.width = actualCardW * scale;
            canvasEl.height = cardH * scale;
            const ctx = canvasEl.getContext('2d');
            ctx.scale(scale, scale);

            ctx.fillStyle = '#ede5d4';
            roundRect(ctx, 0, 0, actualCardW, cardH, 4);
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.07)';
            ctx.lineWidth = 1;
            roundRect(ctx, 0.5, 0.5, actualCardW - 1, cardH - 1, 4);
            ctx.stroke();

            const dynastyMatch = author.match(/〔([^〕]+)〕/);
            const dynasty = dynastyMatch ? dynastyMatch[1] : '';
            if (dynasty) {
                ctx.fillStyle = '#b84c3e';
                ctx.font = `10px ${fontStacks.author}`;
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.letterSpacing = '2px';
                ctx.fillText(dynasty, 18, 22);
            }

            const sealX = actualCardW - 52;
            const rightEmpty = actualCardW - contentCenter - maxLineW / 2;
            const sealFits = rightEmpty >= 52;
            if (sealFits) {
                ctx.fillStyle = '#b84c3e';
                roundRect(ctx, sealX, 18, 34, 34, 2);
                ctx.fill();
                ctx.fillStyle = '#f5efe2';
                ctx.font = `17px ${fontStacks.seal}`;
                ctx.textAlign = 'center';

                const seal = sealChar || (author.match(/^([^〔]+)/) ? author.match(/^([^〔]+)/)[1] : title.charAt(0));
                const slen = seal.length;

                if (slen === 1) {
                    ctx.textBaseline = 'middle';
                    ctx.fillText(seal[0], sealX + 17, 35);
                } else if (slen === 2) {
                    ctx.textBaseline = 'middle';
                    ctx.fillText(seal[0], sealX + 29, 35);
                    ctx.fillText(seal[1], sealX + 5, 35);
                } else if (slen === 3) {
                    ctx.textBaseline = 'middle';
                    ctx.fillText(seal[0], sealX + 29, 23);
                    ctx.fillText(seal[1], sealX + 29, 47);
                    ctx.font = `28px ${fontStacks.seal}`;
                    ctx.textBaseline = 'middle';
                    ctx.fillText(seal[2], sealX + 5, 35);
                } else if (slen === 4) {
                    ctx.textBaseline = 'middle';
                    ctx.fillText(seal[0], sealX + 29, 23);
                    ctx.fillText(seal[1], sealX + 29, 47);
                    ctx.fillText(seal[2], sealX + 5, 23);
                    ctx.fillText(seal[3], sealX + 5, 47);
                }
            }

            ctx.fillStyle = '#1a1a1a';
            ctx.font = `30px ${fontStacks.title}`;
            ctx.textAlign = 'center';
            ctx.fillText(title, cardCenter, 50);

            ctx.fillStyle = '#5a5a5a';
            ctx.font = `11px ${fontStacks.author}`;
            ctx.fillText(author, cardCenter, 90);

            ctx.strokeStyle = 'rgba(0,0,0,0.12)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cardCenter - 18, 118);
            ctx.lineTo(cardCenter + 18, 118);
            ctx.stroke();

            ctx.fillStyle = '#1a1a1a';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            const brushFont = `${fontSize}px ${fontStacks.contentPrimary}`;
            const fallbackFont = `${fontSize}px ${fontStacks.contentFallback}`;

            lines.forEach((line, idx) => {
                const y = 130 + idx * lineHeight;
                ctx.font = brushFont;
                let totalW = 0;
                const widths = [];
                for (const ch of line) {
                    const w = ctx.measureText(ch).width;
                    widths.push(w);
                    totalW += w;
                }
                let xPos = contentCenter - totalW / 2;
                for (let i = 0; i < line.length; i++) {
                    const ch = line[i];
                    const w = widths[i];
                    ctx.font = fallbackFont;
                    const simsunW = ctx.measureText(ch).width;
                    const ratio = simsunW > 0 ? w / simsunW : 1;
                    ctx.font = ratio < 0.7 ? fallbackFont : brushFont;
                    ctx.fillText(ch, xPos, y);
                    xPos += w;
                }
            });

            // Media area (between poem and music banner)
            if (hasMediaArea) {
                const mediaY = 130 + totalLineCount * lineHeight + 16;
                const mediaX = 20;
                const mediaW = actualCardW - 40;
                const mediaH = mediaAreaH - 12;
                const mediaInnerH = mediaH - 8;

                // Background
                ctx.fillStyle = 'rgba(0,0,0,0.03)';
                roundRect(ctx, mediaX, mediaY, mediaW, mediaH, 4);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.07)';
                ctx.lineWidth = 1;
                roundRect(ctx, mediaX + 0.5, mediaY + 0.5, mediaW - 1, mediaH - 1, 4);
                ctx.stroke();

                // Determine which media to show
                const elapsed = mediaElapsed !== undefined ? mediaElapsed : 0;
                const mediaInfo = getMediaItemAtTime(elapsed);

                if (mediaInfo) {
                    const { item, localElapsed } = mediaInfo;
                    const itemDur = getMediaItemDuration(item);

                    // Draw image scaled to fit
                    const img = item.thumb;
                    if (img && img.complete && img.naturalWidth > 0) {
                        const imgAspect = img.naturalWidth / img.naturalHeight;
                        const boxAspect = mediaW / mediaInnerH;
                        let drawW, drawH, drawX, drawY;
                        if (imgAspect > boxAspect) {
                            drawW = mediaW - 16;
                            drawH = drawW / imgAspect;
                        } else {
                            drawH = mediaInnerH - 8;
                            drawW = drawH * imgAspect;
                        }
                        drawX = mediaX + (mediaW - drawW) / 2;
                        drawY = mediaY + (mediaH - drawH) / 2;

                        ctx.save();
                        roundRect(ctx, drawX, drawY, drawW, drawH, 3);
                        ctx.clip();
                        ctx.drawImage(img, drawX, drawY, drawW, drawH);
                        ctx.restore();
                    } else {
                        // Placeholder while loading
                        ctx.fillStyle = 'rgba(0,0,0,0.08)';
                        roundRect(ctx, mediaX + 8, mediaY + 8, mediaW - 16, mediaInnerH, 3);
                        ctx.fill();
                        ctx.fillStyle = 'rgba(0,0,0,0.2)';
                        ctx.font = `13px ${fontStacks.author}`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(`[图片: ${item.name}]`, mediaX + mediaW / 2, mediaY + mediaH / 2);
                    }
                }
            }

            if (hasMetaBanner) {
                const meta = musicState.meta || {};
                const bannerX = 20;
                const bannerY = 130 + totalLineCount * lineHeight + 16 + (hasMediaArea ? mediaAreaH : 0);
                const bannerW = actualCardW - 40;
                const bannerH = 54;
                const coverSize = 34;
                const coverX = bannerX + 8;
                const coverY = bannerY + (bannerH - coverSize) / 2;
                const textStartX = coverX + coverSize + 8;
                const lyricsAreaWidth = 140;
                const textMaxW = bannerX + bannerW - 12 - lyricsAreaWidth - textStartX - 8;

                ctx.fillStyle = 'rgba(0,0,0,0.04)';
                roundRect(ctx, bannerX, bannerY, bannerW, bannerH, 4);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.08)';
                ctx.lineWidth = 1;
                roundRect(ctx, bannerX + 0.5, bannerY + 0.5, bannerW - 1, bannerH - 1, 4);
                ctx.stroke();

                ctx.fillStyle = 'rgba(0,0,0,0.12)';
                roundRect(ctx, coverX, coverY, coverSize, coverSize, 3);
                ctx.fill();
                if (musicState.coverImage && musicState.coverImage.complete) {
                    ctx.save();
                    roundRect(ctx, coverX, coverY, coverSize, coverSize, 3);
                    ctx.clip();
                    ctx.drawImage(musicState.coverImage, coverX, coverY, coverSize, coverSize);
                    ctx.restore();
                }

                const titleText = musicState.bannerShowTitle ? (meta.title || (musicState.file?.name || '未知标题').replace(/\.[^.]+$/, '')) : '';
                const authorText = musicState.bannerShowArtist ? (meta.artist || '未知作者') : '';
                let albumParts = [];
                if (musicState.bannerShowAlbum && meta.album) albumParts.push(meta.album);
                if (musicState.bannerShowClipRange) {
                    const clip = getClipRange();
                    if (clip && clip.endSec > 0) albumParts.push(`${clip.startText}/${clip.endText}`);
                }
                const albumText = albumParts.join(' · ');

                // 左侧上留6，6-18标题(居中12)，21-33作者(居中27)，36-48专辑(居中42)，下留6
                const titleY = bannerY + 12;
                const authorY = bannerY + 27;
                const albumY = bannerY + 42;

                ctx.fillStyle = '#1a1a1a';
                ctx.font = `12px ${fontStacks.author}`;
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                if (musicState.bannerShowTitle) {
                    drawTextWithEllipsis(ctx, titleText, textStartX, titleY, textMaxW);
                }

                ctx.fillStyle = '#5a5a5a';
                ctx.font = `11px ${fontStacks.author}`;
                drawTextWithEllipsis(ctx, authorText, textStartX, authorY, textMaxW);

                if (albumText) {
                    drawTextWithEllipsis(ctx, albumText, textStartX, albumY, textMaxW);
                }

                // 右侧上留9，9-25歌词第1行(居中17)，29-45歌词第2行(居中37)，下留9，行距4px
                if (musicState.showLyrics && musicState.parsedLyrics.length > 0) {
                    const { current, next } = getLyricAtTime(musicState.parsedLyrics, lyricsElapsed || 0);
                    const lyricsRightX = bannerX + bannerW - 12;
                    const lyricsLine0Y = bannerY + 17; // 歌词第1行中心
                    const lyricsLine1Y = bannerY + 37; // 歌词第2行中心
                    const lyricsWidth = lyricsAreaWidth;

                    // Helper function to draw wrapped lyrics
                    const drawWrappedLyric = (text, y, maxWidth, color, fontSize) => {
                        ctx.fillStyle = color;
                        ctx.font = `${fontSize}px ${fontStacks.author}`;
                        ctx.textAlign = 'right';
                        ctx.textBaseline = 'middle';
                        const lines = [];
                        let currentLine = '';
                        for (const ch of text) {
                            const testLine = currentLine + ch;
                            const w = ctx.measureText(testLine).width;
                            if (w > maxWidth && currentLine) {
                                lines.push(currentLine);
                                currentLine = ch;
                            } else {
                                currentLine = testLine;
                            }
                        }
                        if (currentLine) lines.push(currentLine);
                        // Each line in a wrapped lyric occupies 16px height
                        lines.forEach((line, i) => {
                            ctx.fillText(line, lyricsRightX, y + i * 16);
                        });
                    };

                    // Draw current lyric (full opacity, no fade) at lyricsLine0Y
                    if (current) {
                        drawWrappedLyric(current.text, lyricsLine0Y, lyricsWidth - 10, '#1a1a1a', 12);
                    }

                    // Draw next lyric (hidden until it becomes current) at lyricsLine1Y
                    if (next && next.time <= (lyricsElapsed || 0)) {
                        drawWrappedLyric(next.text, lyricsLine1Y, lyricsWidth - 10, '#5a5a5a', 11);
                    }
                }
            }
        }

        function smartWrap(rawLines) {
            const allText = rawLines.join('');
            const totalChars = allText.length;
            const punctCount = (allText.match(/[，。、！？；：]/g) || []).length;
            const minLines = Math.max(1, Math.floor(punctCount / 2));

            if (rawLines.length > minLines) {
                const paired = [];
                for (let i = 0; i < rawLines.length; i += 2) {
                    if (i + 1 < rawLines.length) {
                        const combined = rawLines[i] + '，' + rawLines[i + 1];
                        if (combined.length > 20) {
                            return rawLines;
                        }
                        paired.push(combined);
                    } else {
                        paired.push(rawLines[i]);
                    }
                }
                if (paired.length >= minLines && paired.every(l => l.length >= 7 && l.length <= 20)) {
                    return paired;
                }
            }

            const targetLines = Math.max(minLines, rawLines.length);
            const charsPerLine = Math.min(20, Math.max(7, Math.ceil(totalChars / targetLines)));

            const allChars = allText.split('');
            const newLines = [];
            let current = '';
            for (const ch of allChars) {
                if (current.length >= charsPerLine) {
                    newLines.push(current);
                    current = ch;
                } else {
                    current += ch;
                }
            }
            if (current) newLines.push(current);

            if (newLines.every(l => l.length >= 7 && l.length <= 20)) {
                return newLines;
            }
            return rawLines;
        }

        function downloadCanvas(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        async function copyCanvasToClipboard(canvas) {
            return new Promise((resolve, reject) => {
                canvas.toBlob(async (blob) => {
                    if (!blob) {
                        reject(new Error('Failed to create blob'));
                        return;
                    }
                    try {
                        await navigator.clipboard.write([
                            new ClipboardItem({ 'image/png': blob })
                        ]);
                        resolve();
                    } catch (e) {
                        reject(e);
                    }
                }, 'image/png');
            });
        }

        function getHistory() {
            try {
                return JSON.parse(localStorage.getItem('poemCardHistory') || '[]');
            } catch {
                return [];
            }
        }

        function saveToHistory(entry) {
            const history = getHistory();
            const existing = history.findIndex(h => h.title === entry.title && h.author === entry.author);
            if (existing !== -1) {
                history.splice(existing, 1);
            }
            history.unshift({ ...entry, savedAt: Date.now() });
            if (history.length > 20) {
                history.length = 20;
            }
            localStorage.setItem('poemCardHistory', JSON.stringify(history));
        }

        function removeFromHistory(index) {
            const history = getHistory();
            history.splice(index, 1);
            localStorage.setItem('poemCardHistory', JSON.stringify(history));
        }

        function clearHistory() {
            localStorage.removeItem('poemCardHistory');
        }

        function generateCardFilename(title) {
            return `EditorPhoto_${title}_${Date.now()}.png`;
        }

        let editorData = {
            title: '',
            author: '默存〔现代〕',
            lines: [],
            sealChar: '默存印',
            fontSize: 20,
            lineHeight: 44
        };

        const customFonts = {
            title: null,
            author: null,
            content: null,
            seal: null
        };

        const musicState = {
            file: null,
            url: '',
            meta: null,
            coverImage: null,
            bannerShowTitle: true,
            bannerShowArtist: true,
            bannerShowAlbum: true,
            bannerShowClipRange: true,
            showLyrics: true,
            lyricsText: '',
            parsedLyrics: []
        };

        const mediaState = {
            items: [],
            previewIndex: -1,
            previewElapsed: 0
        };

        let isRendering = false;

        function showToast(msg, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        function renderEditor(lyricsElapsed, mediaElapsed) {
            const title = document.getElementById('editorTitleInput').value || '无题';
            const author = document.getElementById('editorAuthorInput').value || '佚名';
            const textarea = document.getElementById('editorTextarea');
            const lines = textarea.value.split('\n').filter(l => l.trim());
            const fontSize = parseInt(document.getElementById('ctrlFontSize').value);
            const lineHeight = parseInt(document.getElementById('ctrlLineHeight').value);
            const sealChar = document.getElementById('editorSealInput').value;

            editorData = { title, author, lines, sealChar, fontSize, lineHeight };
            applyBannerEditsFromInputs();

            if (lines.length === 0) {
                const canvas = document.getElementById('editorCanvas');
                canvas.width = 400;
                canvas.height = 200;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ede5d4';
                ctx.fillRect(0, 0, 400, 200);
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.font = '14px "Noto Serif SC", serif';
                ctx.textAlign = 'center';
                ctx.fillText('输入诗句后预览', 200, 100);
                return;
            }

            drawCard(document.getElementById('editorCanvas'), {
                ...editorData,
                cardWidth: 0,
                lyricsElapsed,
                mediaElapsed: mediaElapsed !== undefined ? mediaElapsed : mediaState.previewElapsed
            });
        }

        function openEditor(preset) {
            if (preset) {
                document.getElementById('editorTitleInput').value = preset.title || '';
                document.getElementById('editorAuthorInput').value = preset.author || '默存〔现代〕';
                document.getElementById('editorTextarea').value = (preset.lines || []).join('\n');
                document.getElementById('editorSealInput').value = preset.sealChar || '默存印';
                document.getElementById('ctrlFontSize').value = preset.fontSize || 20;
                document.getElementById('ctrlLineHeight').value = preset.lineHeight || 44;
                document.getElementById('valFontSize').textContent = preset.fontSize || 20;
                document.getElementById('valLineHeight').textContent = preset.lineHeight || 44;
            } else {
                document.getElementById('editorTitleInput').value = '';
                document.getElementById('editorAuthorInput').value = '默存〔现代〕';
                document.getElementById('editorTextarea').value = '';
                document.getElementById('editorSealInput').value = '默存印';
                document.getElementById('ctrlFontSize').value = 20;
                document.getElementById('ctrlLineHeight').value = 44;
                document.getElementById('valFontSize').textContent = '20';
                document.getElementById('valLineHeight').textContent = '44';
                editorData = { title: '', author: '默存〔现代〕', lines: [], sealChar: '默存印', fontSize: 20, lineHeight: 44 };
            }
            renderEditor();
            document.getElementById('editorModal').classList.add('show');
        }

        function closeEditor() {
            openEditor();
        }

        function updateFontStateText(zone) {
            const stateEl = document.getElementById(`fontState${zone.charAt(0).toUpperCase()}${zone.slice(1)}`);
            const fontInfo = customFonts[zone];
            stateEl.textContent = fontInfo ? fontInfo.sourceName : '默认字体';
        }

        function cleanupFontResource(zone) {
            const fontInfo = customFonts[zone];
            if (!fontInfo) return;
            if (fontInfo.face) {
                document.fonts.delete(fontInfo.face);
            }
            if (fontInfo.objectUrl) {
                URL.revokeObjectURL(fontInfo.objectUrl);
            }
            customFonts[zone] = null;
        }

        async function applyZoneFont(zone, file) {
            if (!file) return;

        function formatSecToClock(rawSec) {
            const sec = Math.max(0, Math.floor(Number(rawSec) || 0));
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            if (h > 0) {
                return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        function parseClockToSec(inputText) {
            const raw = (inputText || '').trim();
            if (!raw) return 0;
            if (/^\d+(\.\d+)?$/.test(raw)) {
                return Math.max(0, Number(raw));
            }
            const parts = raw.split(':').map(v => v.trim());
            if (!parts.every(v => /^\d+(\.\d+)?$/.test(v))) {
                return NaN;
            }
            if (parts.length === 2) {
                return Number(parts[0]) * 60 + Number(parts[1]);
            }
            if (parts.length === 3) {
                return Number(parts[0]) * 3600 + Number(parts[1]) * 60 + Number(parts[2]);
            }
            return NaN;
        }

        function normalizeClipInputsByDuration(durationSec) {
            const startInput = document.getElementById('clipStartInput');
            const endInput = document.getElementById('clipEndInput');
            if (!startInput.value.trim()) {
                startInput.value = '0:00';
            }
            if (durationSec > 0 && !endInput.value.trim()) {
                endInput.value = formatSecToClock(durationSec);
            }
        }

        function getClipRange() {
            const startInput = document.getElementById('clipStartInput');
            const endInput = document.getElementById('clipEndInput');
            const startRaw = (startInput.value || '0:00').trim();
            const endRaw = (endInput.value || '').trim();
            const startSec = parseClockToSec(startRaw);
            const endSec = endRaw ? parseClockToSec(endRaw) : 0;
            if (!Number.isFinite(startSec) || startSec < 0) {
                showToast('开始时间格式无效，请使用 1:00 或 00:01:00');
                return null;
            }
            if (endRaw && (!Number.isFinite(endSec) || endSec <= 0)) {
                showToast('结束时间格式无效，请使用 2:00 或 00:02:00');
                return null;
            }
            return {
                startSec,
                endSec,
                startText: startRaw || '0:00',
                endText: endRaw
            };
        }

        function parseLyrics(text) {
            const lines = text.split('\n');
            const parsed = [];
            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;
                // Match [mm:ss.xx] or [mm:ss] format
                const match = trimmed.match(/^\[(\d+):(\d+)(?:\.(\d+))?\]\s*(.*)$/);
                if (match) {
                    const m = parseInt(match[1], 10);
                    const s = parseInt(match[2], 10);
                    const ms = match[3] ? parseInt(match[3].padEnd(3, '0').slice(0, 3), 10) : 0;
                    const time = m * 60 + s + ms / 1000;
                    const lyric = match[4] || '';
                    if (lyric) {
                        parsed.push({ time, text: lyric });
                    }
                }
            }
            parsed.sort((a, b) => a.time - b.time);
            return parsed;
        }

        function getLyricAtTime(parsedLyrics, elapsedSec) {
            let current = null;
            let next = null;
            for (let i = 0; i < parsedLyrics.length; i++) {
                if (parsedLyrics[i].time <= elapsedSec) {
                    current = parsedLyrics[i];
                    next = parsedLyrics[i + 1] || null;
                } else {
                    break;
                }
            }
            return { current, next };
        }

        async function readAudioTagInfo(file) {
            const invoke = window.__TAURI__?.core?.invoke;
            if (invoke) {
                const audioBuffer = await file.arrayBuffer();
                const audioBase64 = arrayBufferToBase64(audioBuffer);
                try {
                    const meta = await invoke('inspect_audio_tags', {
                        audioBase64,
                        audioExtension: getMusicFileExtension(file)
                    });
                    return {
                        title: meta?.title || '',
                        artist: meta?.artist || '',
                        album: meta?.album || '',
                        durationSec: Number(meta?.durationSec || 0),
                        coverDataUrl: meta?.coverDataUrl || '',
                        lyrics: meta?.lyrics || ''
                    };
                } catch {
                }
            }
            const tempUrl = URL.createObjectURL(file);
            const fallbackDuration = await new Promise((resolve) => {
                const audio = new Audio(tempUrl);
                const done = () => {
                    const d = Number(audio.duration);
                    resolve(Number.isFinite(d) ? d : 0);
                };
                audio.addEventListener('loadedmetadata', done, { once: true });
                audio.addEventListener('error', () => resolve(0), { once: true });
            });
            URL.revokeObjectURL(tempUrl);
            return {
                title: file.name.replace(/\.[^.]+$/, ''),
                artist: '',
                album: '',
                durationSec: fallbackDuration,
                coverDataUrl: ''
            };
        }

        // ============ Media Management ============

        function generateMediaId() {
            return 'media_' + Date.now() + '_' + Math.random().toString(16).slice(2, 6);
        }

        function getMediaItemDuration(item) {
            return item.duration || 5;
        }

        function getMediaTotalDuration() {
            return mediaState.items.reduce((sum, item) => sum + getMediaItemDuration(item), 0);
        }

        function getMediaItemAtTime(elapsedSec) {
            if (mediaState.items.length === 0) return null;
            let accumulated = 0;
            for (const item of mediaState.items) {
                const itemDur = getMediaItemDuration(item);
                if (elapsedSec < accumulated + itemDur) {
                    const localElapsed = elapsedSec - accumulated;
                    return { item, localElapsed };
                }
                accumulated += itemDur;
            }
            // Beyond total duration: return last item at its full duration (freeze last frame)
            const lastItem = mediaState.items[mediaState.items.length - 1];
            return { item: lastItem, localElapsed: getMediaItemDuration(lastItem) };
        }

        async function loadMediaItemThumbnail(item) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => { item.thumb = img; resolve(); };
                img.onerror = () => resolve();
                img.src = item.url;
            });
        }

        async function addMediaFile(file) {
            const id = generateMediaId();
            const url = URL.createObjectURL(file);

            const item = {
                id,
                type: 'image',
                file,
                url,
                name: file.name,
                duration: 5,
                thumb: null
            };

            mediaState.items.push(item);
            await loadMediaItemThumbnail(item);
            renderMediaItemList();
            updateMediaTotalDuration();
            renderEditor();
        }

        function removeMediaItem(id) {
            const idx = mediaState.items.findIndex(i => i.id === id);
            if (idx !== -1) {
                const item = mediaState.items[idx];
                if (item.url) URL.revokeObjectURL(item.url);
                mediaState.items.splice(idx, 1);
            }
            if (mediaState.previewIndex >= mediaState.items.length) {
                mediaState.previewIndex = mediaState.items.length - 1;
            }
            renderMediaItemList();
            updateMediaTotalDuration();
            renderEditor();
        }

        function updateMediaItemDuration(id, duration) {
            const item = mediaState.items.find(i => i.id === id);
            if (item) {
                item.duration = Math.max(1, Math.min(300, parseInt(duration) || 5));
            }
            updateMediaTotalDuration();
            renderEditor();
        }

        function moveMediaItem(fromIndex, toIndex) {
            if (fromIndex < 0 || fromIndex >= mediaState.items.length) return;
            if (toIndex < 0 || toIndex >= mediaState.items.length) return;
            const [item] = mediaState.items.splice(fromIndex, 1);
            mediaState.items.splice(toIndex, 0, item);
            renderMediaItemList();
            renderEditor();
        }

        function renderMediaItemList() {
            const list = document.getElementById('mediaItemList');
            if (mediaState.items.length === 0) {
                list.innerHTML = '<div class="media-empty-hint">暂无媒体内容，可上传图片</div>';
                return;
            }

            list.innerHTML = mediaState.items.map((item, idx) => {
                const thumbSrc = item.thumb ? item.url : '';
                const durationUnit = '秒';

                return `
                    <div class="media-item" data-id="${item.id}" data-idx="${idx}">
                        ${thumbSrc
                            ? `<img class="media-item-thumb" src="${thumbSrc}" />`
                            : `<div class="media-item-thumb" style="display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(0,0,0,0.2)">?</div>`
                        }
                        <div class="media-item-info">
                            <div class="media-item-name" title="${item.name}">${item.name}</div>
                            <div class="media-item-meta">图片 · ${item.duration}秒</div>
                        </div>
                        <div class="media-item-duration-row">
                            <input class="media-item-duration-input" type="number"
                                value="${item.duration}" min="1" max="300"
                                data-id="${item.id}" />
                            <span class="media-item-duration-unit">${durationUnit}</span>
                        </div>
                        <div class="media-item-actions">
                            <span class="media-item-move-btn" data-move="up" data-idx="${idx}" title="上移" ${idx === 0 ? 'style="visibility:hidden"' : ''}>↑</span>
                            <span class="media-item-move-btn" data-move="down" data-idx="${idx}" title="下移" ${idx === mediaState.items.length - 1 ? 'style="visibility:hidden"' : ''}>↓</span>
                        </div>
                        <span class="media-item-remove" data-remove="${item.id}">×</span>
                    </div>
                `;
            }).join('');

            // Duration input handlers
            list.querySelectorAll('.media-item-duration-input').forEach(input => {
                input.addEventListener('change', (e) => {
                    updateMediaItemDuration(e.target.dataset.id, e.target.value);
                });
                input.addEventListener('click', (e) => e.stopPropagation());
            });

            // Remove button handlers
            list.querySelectorAll('.media-item-remove').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeMediaItem(e.target.dataset.remove);
                });
            });

            // Move button handlers
            list.querySelectorAll('.media-item-move-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.idx);
                    const dir = btn.dataset.move;
                    if (dir === 'up' && idx > 0) {
                        moveMediaItem(idx, idx - 1);
                    } else if (dir === 'down' && idx < mediaState.items.length - 1) {
                        moveMediaItem(idx, idx + 1);
                    }
                });
            });
        }

        function updateMediaTotalDuration() {
            const total = getMediaTotalDuration();
            const el = document.getElementById('mediaTotalDuration');
            if (mediaState.items.length > 0) {
                const m = Math.floor(total / 60);
                const s = Math.floor(total % 60);
                el.textContent = `媒体总时长: ${m > 0 ? m + '分' : ''}${s}秒 (共${mediaState.items.length}项)`;
            } else {
                el.textContent = '';
            }
        }

        // ============ End Media Management ============

        function getMusicFileExtension(file) {
            const byName = (file?.name || '').split('.').pop()?.trim().toLowerCase() || '';
            if (byName && /^[a-z0-9]+$/.test(byName)) {
                return byName;
            }
            const byType = (file?.type || '').split('/').pop()?.trim().toLowerCase() || '';
            if (byType && /^[a-z0-9]+$/.test(byType)) {
                return byType;
            }
            return 'mp3';
        }

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            const chunkSize = 0x8000;
            let binary = '';
            for (let i = 0; i < bytes.length; i += chunkSize) {
                const chunk = bytes.subarray(i, i + chunkSize);
                binary += String.fromCharCode(...chunk);
            }
            return btoa(binary);
        }

        async function fileToDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result || ''));
                reader.onerror = () => reject(new Error('读取文件失败'));
                reader.readAsDataURL(file);
            });
        }

        async function exportWithFfmpegOffline() {
            const invoke = window.__TAURI__?.core?.invoke;
            if (!invoke) {
                return null;
            }

            const hasMusic = !!(musicState.file);
            const hasMedia = mediaState.items.length > 0;

            if (!hasMusic && !hasMedia) {
                showToast('请先添加背景音乐或媒体内容');
                return false;
            }

            if (editorData.lines.length === 0) {
                showToast('请先输入诗句');
                return false;
            }

            const canvas = document.getElementById('editorCanvas');

            // Calculate total duration
            const mediaTotalDuration = getMediaTotalDuration();
            let audioDuration = 0;
            let audioBase64 = '';
            let audioExtension = '';
            let clipRange = null;

            if (hasMusic) {
                const audioBuffer = await musicState.file.arrayBuffer();
                audioBase64 = arrayBufferToBase64(audioBuffer);
                audioExtension = getMusicFileExtension(musicState.file);
                clipRange = getClipRange();
                if (!clipRange) {
                    return false;
                }
                const endSec = clipRange.endSec > 0 ? clipRange.endSec : (musicState.meta?.duration_sec || 0);
                audioDuration = endSec - clipRange.startSec + 1;
            }

            const baseDuration = Math.max(audioDuration, mediaTotalDuration, 1);
            const totalDuration = baseDuration;

            if (totalDuration <= 0) {
                showToast('导出时长无效');
                return false;
            }

            // Frame-by-frame rendering
            const fps = 1;
            const frameDuration = 1.0 / fps;
            const frameDataUrls = [];

            let lastShownItemId = null;
            const startInput = document.getElementById('clipStartInput');
            const endInput = document.getElementById('clipEndInput');
            const savedStart = startInput.value;
            const savedEnd = endInput.value;

            for (let t = 0; t < totalDuration; t += frameDuration) {
                const mediaElapsed = t;
                const lyricsElapsed = hasMusic && clipRange ? clipRange.startSec + t : t;

                // Update start input to show current position (step effect)
                const m = Math.floor(t / 60);
                const s = Math.floor(t % 60);
                startInput.value = `${m}:${s.toString().padStart(2, '0')}`;

                renderEditor(lyricsElapsed, mediaElapsed);

                // Get current media item to detect transitions
                const currentMedia = getMediaItemAtTime(mediaElapsed);
                const currentItemId = currentMedia ? currentMedia.item.id : null;

                const dataUrl = canvas.toDataURL('image/png');
                frameDataUrls.push(dataUrl);

                lastShownItemId = currentItemId;
            }

            // Ensure we have at least one frame
            if (frameDataUrls.length === 0) {
                renderEditor(0, 0);
                frameDataUrls.push(canvas.toDataURL('image/png'));
            }

            // Duplicate last frame 30 times to make it linger for 1 extra second (30fps video)
            if (frameDataUrls.length > 0) {
                const lastFrame = frameDataUrls[frameDataUrls.length - 1];
                for (let i = 0; i < 30; i++) {
                    frameDataUrls.push(lastFrame);
                }
            }

            // Restore original clip values
            startInput.value = savedStart;
            endInput.value = savedEnd;

            // Restore editor
            renderEditor();

            try {
                const outputPath = await invoke('export_video_ffmpeg', {
                    poemCardPng: frameDataUrls[0],
                    poemCardW: canvas.width,
                    poemCardH: canvas.height,
                    mediaAreaY: 0,
                    mediaAreaH: 0,
                    mediaItemsJson: JSON.stringify([]),
                    audioBase64: audioBase64,
                    audioExtension: audioExtension,
                    title: editorData.title || '无题',
                    startSec: clipRange ? clipRange.startText : '0',
                    endSec: clipRange ? clipRange.endText : '',
                    totalDuration: totalDuration,
                    frameDataUrls: frameDataUrls,
                    fps: fps
                });
                return outputPath;
            } catch (error) {
                const msg = typeof error === 'string' ? error : (error?.message || JSON.stringify(error));
                throw new Error(msg || 'FFmpeg离线导出失败');
            }
        }

        function formatTime(ts) {
            const d = new Date(ts);
            const m = d.getMonth() + 1;
            const day = d.getDate();
            const h = d.getHours().toString().padStart(2, '0');
            const min = d.getMinutes().toString().padStart(2, '0');
            return `${m}/${day} ${h}:${min}`;
        }
